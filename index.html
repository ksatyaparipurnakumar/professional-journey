<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%)}
.lock-box{background:#fff;border-radius:16px;padding:2.5rem;width:min(400px,90vw);box-shadow:0 25px 50px rgba(0,0,0,.25);text-align:center}
.lock-icon{font-size:48px;margin-bottom:1rem}
h2{font-size:1.25rem;color:#1e293b;margin-bottom:.5rem}
p{font-size:.875rem;color:#64748b;margin-bottom:1.5rem}
input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s}
input:focus{border-color:#3b82f6}
button{width:100%;padding:12px;margin-top:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#2563eb}
.error{color:#ef4444;font-size:.8rem;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="lock-box">
<div class="lock-icon">&#128274;</div>
<h2>This dashboard is protected</h2>
<p>Enter the password to continue</p>
<input type="password" id="pw" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()">Unlock</button>
<div class="error" id="err">Incorrect password. Try again.</div>
</div>
